server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Apply Cross-Origin Isolation headers for SharedArrayBuffer (Stockfish WASM)
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location / {
        # SPA routing fallback
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache and MIME types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
        
        # Ensure COOP/COEP headers are also set for assets
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        
        # Specific fix for WASM MIME type, though nginx usually handles it if mime.types is included
        if ($request_uri ~* \.wasm$) {
            add_header Content-Type application/wasm;
        }
    }
}
